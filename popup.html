<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { width: 220px; font-family: sans-serif; padding: 10px; margin: 0; }
    h3 { margin-top: 0; color: #333; }
    label { display: block; margin: 8px 0; cursor: pointer; }
    button { width: 100%; padding: 8px; margin-top: 10px; background: #0060df; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
    button:hover { background: #0045a1; }
  </style>
</head>
<body>
  <h3>Forger Filters</h3>

  <label><input type="checkbox" id="filtroMinusculas" checked> Force LowerCase</label>
  <label><input type="checkbox" id="filtroAlfabetico" checked> Alfabetic Order</label>
  <label><input type="checkbox" id="filtroNumeros" checked> Keep Numbers</label>
  <label><input type="checkbox" id="filtroCorreos"> Extract Emails</label>
  <label><input type="checkbox" id="filtroUrls"> Extract URLs</label>
  
  <button id="btnEscanear">Generate List</button>

  <script src="popup.js"></script>
</body>
</html>
